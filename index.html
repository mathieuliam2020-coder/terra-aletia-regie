<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Aletia Régie</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>🎭 Terra Aletia Régie</h1>
    <p>Gestion des accessoires du spectacle</p>
</header>

<main class="container">

    <div class="card" id="accessoires">
        <div class="icon">📦</div>
        <h2>Accessoires</h2>
        <p>Gérer tous les accessoires</p>
        <button>Ouvrir</button>
    </div>

    <div class="card" id="scenes">
        <div class="icon">🎬</div>
        <h2>Scènes</h2>
        <p>Les 21 scènes du spectacle</p>
        <button>Ouvrir</button>
    </div>

    <div class="card" id="checkup">
        <div class="icon">✅</div>
        <h2>Check-up</h2>
        <p>Préparation avant spectacle</p>
        <button>Ouvrir</button>
    </div>

    <div class="card" id="spectacle">
        <div class="icon">▶</div>
        <h2>Mode Spectacle</h2>
        <p>Utilisation pendant la représentation</p>
        <button>Commencer</button>
    </div>

</main>

<footer>

Version 0.1

</footer>

<script src="app.js"></script>

</body>
</html>
